name: Publish API Contract

on:
    push:
        tags:
            - "v*"

permissions:
    contents: read
    packages: write

jobs:
    publish:
        runs-on: self-hosted

        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Setup Go
              uses: actions/setup-go@v5
              with:
                  go-version-file: go.mod
                  cache: false

            - name: Install ORAS
              uses: oras-project/setup-oras@v1

            - name: Build contract bundle
              run: |
                  mkdir -p bundle

                  # Bundle all CRDs into a single manifest
                  cat config/crd/bases/*.yaml > bundle/crds.yaml

                  # Optional OpenAPI artifacts
                  [ -f openapi.yaml ] && cp openapi.yaml bundle/
                  [ -f openapi.json ] && cp openapi.json bundle/

                  cat > bundle/metadata.yaml <<EOF
                  version: ${GITHUB_REF_NAME}
                  repository: ${GITHUB_REPOSITORY}
                  publishedAt: $(date -u +"%Y-%m-%dT%H:%M:%SZ")
                  EOF

            - name: Login to GHCR
              uses: docker/login-action@v3
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GH_PAT }}

            - name: Publish OCI Package
              run: |
                  oras push \
                    ghcr.io/${{ github.repository_owner }}/api-contract:${{ github.ref_name }} \
                    bundle/crds.yaml:application/yaml \
                    bundle/metadata.yaml:application/yaml

            - name: Publish Summary
              run: |
                  cat >> $GITHUB_STEP_SUMMARY <<EOF
                  # 📦 API Contract Package Published

                  ## Version

                  \`${{ github.ref_name }}\`

                  ## Registry

                  \`ghcr.io/${{ github.repository_owner }}/api-contract:${{ github.ref_name }}\`

                  ## Contents

                  - Kubernetes CRDs
                  - Contract metadata

                  ## Consume

                  Pull the package:

                  \`\`\`bash
                  oras pull ghcr.io/${{ github.repository_owner }}/api-contract:${{ github.ref_name }}
                  \`\`\`

                  Apply CRDs:

                  \`\`\`bash
                  kubectl apply -f crds.yaml
                  \`\`\`
                  EOF
